apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: home-wildcard
  namespace: default
spec:
  secretName: home-tls
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
  commonName: "*.home"
  dnsNames:
    - "*.home"
    - "home"
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
