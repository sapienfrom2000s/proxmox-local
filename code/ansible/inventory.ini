[kube_control_plane]
cp ansible_host=192.168.1.10

[kube_node]
alpha ansible_host=192.168.1.11
beta ansible_host=192.168.1.12

# Use sudo for privilege escalation on all tasks
# Skip SSH host key verification (avoids prompts on first connect to fresh VMs)
[all:vars]
ansible_user=debian
ansible_become=yes
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
