[control_plane]
cp ansible_host=192.168.1.10

[workers]
alpha ansible_host=192.168.1.11
beta ansible_host=192.168.1.12

[all:vars]
ansible_user=debian
ansible_become=yes              ; Use sudo for privilege escalation on all tasks
ansible_ssh_common_args='-o StrictHostKeyChecking=no'  ; Skip SSH host key verification (avoids prompts on first connect to fresh VMs)
