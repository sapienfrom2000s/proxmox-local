---
# ArgoCD setup — installs ArgoCD CLI and connects to the GitHub repo.
#
# 1. Install ArgoCD CLI binary
# 2. Log in to ArgoCD server
# 3. Add the GitHub repo as a source

- name: ArgoCD setup
  hosts: kube_control_plane
  become: true

  vars:
    argocd_version: "v3.4.5"
    argocd_server: "192.168.1.201"
    github_repo: "https://github.com/sapienfrom2000s/proxmox-local.git"

  tasks:
    - name: Install ArgoCD CLI
      ansible.builtin.get_url:
        url: "https://github.com/argoproj/argo-cd/releases/download/{{ argocd_version }}/argocd-linux-amd64"
        dest: /usr/local/bin/argocd
        mode: "0755"

    - name: Get ArgoCD admin password
      ansible.builtin.shell: >
        kubectl -n argocd get secret argocd-initial-admin-secret
        -o jsonpath="{.data.password}" | base64 -d
      register: argocd_password
      changed_when: false

    - name: Log in to ArgoCD
      ansible.builtin.command: >
        argocd login {{ argocd_server }}
        --username admin
        --password {{ argocd_password.stdout }}
        --insecure
        --plaintext
      changed_when: false

    - name: Add GitHub repo
      ansible.builtin.command: >
        argocd repo add {{ github_repo }}
      register: repo_add
      changed_when: "'already exists' not in repo_add.stdout"
      failed_when: repo_add.rc != 0 and 'already exists' not in repo_add.stdout
