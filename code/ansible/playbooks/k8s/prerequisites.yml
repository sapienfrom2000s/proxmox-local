---
# K8s prerequisites — installs and configures everything kubeadm needs on all nodes.
#
# 1. Disable swap — kubelet refuses to start if swap is detected
# 2. Kernel modules — overlay for container filesystems, br_netfilter for iptables on bridged traffic
# 3. Sysctl params — ip forwarding for pod networking, bridge-nf-call for kube-proxy
# 4. Containerd — CRI (Container Runtime Interface) that kubelet talks to
# 5. Kubernetes packages — kubeadm (cluster bootstrap), kubelet (node agent), kubectl (CLI)

- name: K8s prerequisites
  hosts: all
  become: true

  vars:
    kubernetes_version: "1.36"

  tasks:
    # --- Swap ---
    # kubelet checks for swap on startup and refuses to run if found.
    # Disable now and remove from fstab so it stays off after reboot.

    - name: Disable swap
      ansible.builtin.command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: Remove swap from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '\sswap\s'
        state: absent

    # --- Kernel modules ---
    # overlay: allows containerd to use overlayfs for container layering (efficient CoW)
    # br_netfilter: makes iptables see bridged traffic, required for kube-proxy and network policies

    - name: Load kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Persist kernel modules
      ansible.builtin.copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/k8s.conf
        mode: "0644"

    # --- Sysctl parameters ---
    # ip_forward: nodes must route traffic between pods on different nodes
    # bridge-nf-call-iptables/ip6tables: lets kube-proxy's iptables rules work on bridged pod traffic

    - name: Set sysctl params
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: true
      loop:
        - { key: "net.ipv4.ip_forward", value: "1" }
        - { key: "net.bridge.bridge-nf-call-iptables", value: "1" }
        - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }

    # --- Containerd ---
    # containerd is the CRI that kubelet uses to manage containers.
    # Debian's built-in version is outdated, so we install from Docker's repo.

    - name: Install containerd prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.gpg
        mode: "0644"

    - name: Add Docker repo
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian trixie stable"
        state: present
        filename: docker

    - name: Install containerd
      ansible.builtin.apt:
        name: "containerd.io"
        state: present
        update_cache: true

    # containerd config — SystemdCgroup must be true for kubelet to work correctly.
    # Without it, container cgroups are managed by containerd's own shim, not systemd,
    # which breaks kubelet's resource accounting.

    - name: Create containerd config directory
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: "0755"

    - name: Generate default containerd config
      ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Enable SystemdCgroup
      ansible.builtin.lineinfile:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        line: '          SystemdCgroup = true'

    - name: Enable CRI plugin
      ansible.builtin.lineinfile:
        path: /etc/containerd/config.toml
        regexp: 'disabled_plugins = \["cri"\]'
        state: absent

    - name: Restart containerd
      ansible.builtin.systemd:
        name: containerd
        state: restarted
        enabled: true

    # --- Kubernetes packages ---
    # kubeadm: bootstraps the cluster (init, join)
    # kubelet: node agent, manages pods on this node
    # kubectl: CLI to talk to the API server
    # Held at installed version to prevent accidental upgrades breaking the cluster.

    - name: Download Kubernetes GPG key
      ansible.builtin.get_url:
        url: https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key
        dest: /etc/apt/keyrings/kubernetes.gpg
        mode: "0644"

    - name: Add Kubernetes repo
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /"
        state: present
        filename: kubernetes

    - name: Install kubeadm, kubelet, kubectl
      ansible.builtin.apt:
        name:
          - "kubelet"
          - "kubeadm"
          - "kubectl"
        state: present
        update_cache: true

    - name: Hold Kubernetes packages
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl
